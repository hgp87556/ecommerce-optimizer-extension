<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Optimizer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🛍️ E-Commerce Optimizer</h1>
            <p class="subtitle">Analyze & Combine Best Store Features</p>
        </header>

        <main>
            <!-- URL Input Section -->
            <section class="input-section">
                <label for="urlInput">Store URLs (one per line):</label>
                <textarea 
                    id="urlInput" 
                    placeholder="https://store1.com&#10;https://store2.com&#10;https://store3.com"
                    class="url-input"
                    rows="4"
                ></textarea>
                <button id="analyzeBtn" class="btn btn-primary">🔍 Analyze Sites</button>
            </section>

            <!-- Loading State -->
            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p id="loadingText">Analyzing your stores...</p>
            </div>

            <!-- Results Section -->
            <section id="results" class="hidden results-section">
                <h2>Analysis Results</h2>
                
                <!-- Analysis Summary -->
                <div class="result-card">
                    <h3>📊 Sites Analyzed</h3>
                    <div id="analyzedSites"></div>
                </div>

                <!-- Design Elements Found -->
                <div class="result-card">
                    <h3>🎨 Design Elements Detected</h3>
                    <div id="designElements"></div>
                </div>

                <!-- Features Comparison -->
                <div class="result-card">
                    <h3>✨ Best Features Found</h3>
                    <ul id="bestFeaturesList" class="features-list"></ul>
                </div>

                <!-- Color Analysis -->
                <div class="result-card">
                    <h3>🎭 Color Schemes</h3>
                    <div id="colorAnalysis"></div>
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons">
                    <button id="optimizeBtn" class="btn btn-success">✨ Generate Optimized Template</button>
                    <button id="previewBtn" class="btn btn-info">👁️ Preview</button>
                </div>
            </section>

            <!-- Export Options -->
            <section id="export" class="hidden export-section">
                <h2>Export Options</h2>
                <div id="templateSummary" class="template-summary"></div>
                <div class="export-buttons">
                    <button id="shopifyBtn" class="btn btn-shopify">📦 Export for Shopify</button>
                    <button id="htmlBtn" class="btn btn-html">📄 Download HTML</button>
                    <button id="cssBtn" class="btn btn-css">🎨 Download CSS</button>
                    <button id="backBtn" class="btn btn-secondary">← Back</button>
                </div>
            </section>

            <!-- Error State -->
            <div id="error" class="hidden error-message">
                <p id="errorText"></p>
                <button class="btn btn-secondary" onclick="location.reload()">Retry</button>
            </div>
        </main>
    </div>

    <script src="site-analyzer.js"></script>
    <script src="design-extractor.js"></script>
    <script src="template-generator.js"></script>
    <script src="shopify-generator.js"></script>
    <script src="popup.js"></script>
</body>
</html>
